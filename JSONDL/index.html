<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>HỆ THỐNG THI THÔNG MINH 2026 - LỚP TOÁN THẦY BÌNH</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%); min-height: 100vh; padding: 20px; }
        
        .container { max-width: 800px; margin: 80px auto; background: white; border-radius: 30px; padding: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); text-align: center; }
        .logo { font-size: 4rem; margin-bottom: 20px; }
        h1 { color: #1a237e; margin-bottom: 10px; }
        .subtitle { color: #666; margin-bottom: 30px; }
        
        .invite-box { background: #e8eaf6; border-radius: 20px; padding: 30px; margin-bottom: 30px; }
        .invite-title { font-size: 1.3rem; font-weight: bold; color: #1a237e; margin-bottom: 15px; }
        .exam-code { background: white; padding: 10px; border-radius: 10px; font-family: monospace; font-size: 1.1rem; margin: 15px 0; }
        
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-weight: 600; margin-bottom: 8px; color: #1a237e; }
        .input-group input { width: 100%; padding: 15px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 1rem; }
        .input-group input:focus { border-color: #1a237e; outline: none; }
        
        .btn-start { background: linear-gradient(135deg, #1a237e, #0d1757); color: white; border: none; padding: 15px 30px; border-radius: 50px; font-size: 1.1rem; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-start:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(26,35,126,0.3); }
        
        .normal-mode { border-top: 2px solid #e0e0e0; margin-top: 30px; padding-top: 30px; }
        .normal-mode h3 { color: #1a237e; margin-bottom: 20px; }
        
        .loading { display: inline-block; width: 20px; height: 20px; border: 2px solid #f3f3f3; border-top: 2px solid #1a237e; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 8px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .notification { position: fixed; top: 20px; right: 20px; padding: 15px 25px; border-radius: 12px; color: white; z-index: 9999; animation: slideIn 0.3s; }
        .notification.error { background: #c62828; }
        .notification.success { background: #2e7d32; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>
<div class="container" id="mainContainer">
    <div class="logo">📐</div>
    <h1>MATH HUB V2 - 2026</h1>
    <div class="subtitle">Hệ thống thi thông minh - Lớp Toán Thầy Bình</div>
    
    <div id="dynamicContent"></div>
</div>

<script>
    // ==================== CẤU HÌNH FIREBASE V2 MỚI ====================
    const firebaseConfig = {
        apiKey: "AIzaSyCs0lTFawsn0ibf_BsZcoAr8sdQJD68brA",
        authDomain: "mathhub-v2-2026.firebaseapp.com",
        databaseURL: "https://mathhub-v2-2026-default-rtdb.firebaseio.com",
        projectId: "mathhub-v2-2026",
        storageBucket: "mathhub-v2-2026.firebasestorage.app",
        messagingSenderId: "1354411258",
        appId: "1:1354411258:web:406775fcadcc319f82ad43",
        measurementId: "G-7S2HKST98Z"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    const urlParams = new URLSearchParams(window.location.search);
    const teacherId = urlParams.get('t');
    const examId = urlParams.get('exam');
    
    if (teacherId) sessionStorage.setItem('invited_teacher', teacherId);
    if (examId) sessionStorage.setItem('invited_exam', examId);
    
    function showNotification(msg, type) {
        const notif = document.createElement('div');
        notif.className = `notification ${type}`;
        notif.innerHTML = msg;
        document.body.appendChild(notif);
        setTimeout(() => notif.remove(), 3000);
    }
    
    async function renderInviteMode() {
        try {
            const examSnap = await db.ref(`teachers/${teacherId}/exams/${examId}`).once('value');
            const examData = examSnap.val();
            
            if (!examData) {
                document.getElementById('dynamicContent').innerHTML = `
                    <div class="invite-box" style="background:#ffebee;">
                        <div class="invite-title">❌ KHÔNG TÌM THẤY ĐỀ THI</div>
                        <p>Đề thi này có thể đã bị xóa hoặc không tồn tại.</p>
                        <button class="btn-start" onclick="goToNormalMode()" style="margin-top:20px;">Quay lại trang chủ</button>
                    </div>
                `;
                return;
            }
            
            document.getElementById('dynamicContent').innerHTML = `
                <div class="invite-box">
                    <div class="invite-title">📝 BẠN ĐƯỢC MỜI LÀM BÀI THI</div>
                    <p><strong>Đề thi:</strong> ${escapeHtml(examData.name)}</p>
                    <p><strong>Thời gian:</strong> ${examData.duration || 90} phút</p>
                    <div class="exam-code">Mã đề: ${examId}</div>
                    
                    <div class="input-group">
                        <label><i class="fas fa-user-graduate"></i> Mã học sinh *</label>
                        <input type="text" id="studentCode" placeholder="VD: HS001" autocomplete="off">
                    </div>
                    
                    <div class="input-group">
                        <label><i class="fas fa-signature"></i> Họ tên học sinh *</label>
                        <input type="text" id="studentName" placeholder="Nhập họ tên đầy đủ">
                    </div>
                    
                    <button class="btn-start" onclick="startExam()">
                        <i class="fas fa-play"></i> BẮT ĐẦU LÀM BÀI
                    </button>
                </div>
            `;
        } catch (error) {
            console.error(error);
            showNotification('Lỗi tải dữ liệu đề thi!', 'error');
        }
    }
    
    function renderNormalMode() {
        document.getElementById('dynamicContent').innerHTML = `
            <div class="normal-mode">
                <h3><i class="fas fa-search"></i> TRA CỨU BÀI THI</h3>
                <div class="input-group">
                    <label><i class="fas fa-link"></i> Nhập link mời hoặc mã đề</label>
                    <input type="text" id="inviteCode" placeholder="Dán link hoặc nhập mã đề...">
                </div>
                <div class="input-group">
                    <label><i class="fas fa-user-graduate"></i> Mã học sinh</label>
                    <input type="text" id="normalStudentCode" placeholder="VD: HS001">
                </div>
                <div class="input-group">
                    <label><i class="fas fa-signature"></i> Họ tên học sinh</label>
                    <input type="text" id="normalStudentName" placeholder="Nhập họ tên đầy đủ">
                </div>
                <button class="btn-start" onclick="searchAndStart()">
                    <i class="fas fa-search"></i> TRA CỨU & VÀO THI
                </button>
            </div>
        `;
    }
    
    function goToNormalMode() {
        window.location.href = window.location.pathname;
    }
    
    function startExam() {
        const studentCode = document.getElementById('studentCode')?.value.trim();
        const studentName = document.getElementById('studentName')?.value.trim();
        
        if (!studentCode) {
            showNotification('Vui lòng nhập mã học sinh!', 'error');
            return;
        }
        if (!studentName) {
            showNotification('Vui lòng nhập họ tên!', 'error');
            return;
        }
        
        sessionStorage.setItem('student_code', studentCode);
        sessionStorage.setItem('student_name', studentName);
        sessionStorage.setItem('teacher_id', teacherId);
        sessionStorage.setItem('exam_id', examId);
        
        window.location.href = `PTLTNM.html?t=${teacherId}&exam=${examId}&code=${encodeURIComponent(studentCode)}&name=${encodeURIComponent(studentName)}`;
    }
    
    async function searchAndStart() {
        const inviteCode = document.getElementById('inviteCode')?.value.trim();
        const studentCode = document.getElementById('normalStudentCode')?.value.trim();
        const studentName = document.getElementById('normalStudentName')?.value.trim();
        
        if (!studentCode) {
            showNotification('Vui lòng nhập mã học sinh!', 'error');
            return;
        }
        if (!studentName) {
            showNotification('Vui lòng nhập họ tên!', 'error');
            return;
        }
        
        let targetTeacherId = null;
        let targetExamId = null;
        
        if (inviteCode) {
            const linkMatch = inviteCode.match(/[?&]t=([^&]+)&exam=([^&]+)/);
            if (linkMatch) {
                targetTeacherId = linkMatch[1];
                targetExamId = linkMatch[2];
            } else {
                showNotification('Vui lòng sử dụng link mời hợp lệ từ giáo viên!', 'error');
                return;
            }
        }
        
        if (!targetTeacherId || !targetExamId) {
            showNotification('Vui lòng nhập link mời hợp lệ!', 'error');
            return;
        }
        
        const examSnap = await db.ref(`teachers/${targetTeacherId}/exams/${targetExamId}`).once('value');
        if (!examSnap.exists()) {
            showNotification('Không tìm thấy đề thi!', 'error');
            return;
        }
        
        sessionStorage.setItem('student_code', studentCode);
        sessionStorage.setItem('student_name', studentName);
        sessionStorage.setItem('teacher_id', targetTeacherId);
        sessionStorage.setItem('exam_id', targetExamId);
        
        window.location.href = `PTLTNM.html?t=${targetTeacherId}&exam=${targetExamId}&code=${encodeURIComponent(studentCode)}&name=${encodeURIComponent(studentName)}`;
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }
    
    if (teacherId && examId) {
        renderInviteMode();
    } else {
        renderNormalMode();
    }
</script>
</body>
</html>
